server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;
    absolute_redirect off;
    resolver 127.0.0.11 valid=30s ipv6=off;

    set $backend_upstream backend:8000;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self'; font-src 'self' data:;" always;

    # Serve pre-compressed .gz files when available
    gzip_static on;

    # Fallback dynamic gzip for non-precompressed responses
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 256;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Static assets with content hash — immutable long cache
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Font files — long cache
    location /fonts/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /api/ {
        proxy_pass http://$backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # OpenAPI docs (Swagger UI + ReDoc)
    location /docs {
        proxy_pass http://$backend_upstream/docs;
        proxy_set_header Host $host;
    }
    location /redoc {
        proxy_pass http://$backend_upstream/redoc;
        proxy_set_header Host $host;
    }
    location /openapi.json {
        proxy_pass http://$backend_upstream/openapi.json;
        proxy_set_header Host $host;
    }

    # index.html must not be cached (references hashed assets)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
