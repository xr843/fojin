server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;
    absolute_redirect off;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-eval' https://analytics.fojin.app; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://analytics.fojin.app https://*.cartocdn.com https://tiles.openfreemap.org; font-src 'self' data:; worker-src 'self' blob:;" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    # Serve pre-compressed .gz files when available
    gzip_static on;

    # Fallback dynamic gzip for non-precompressed responses
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 256;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Static assets with content hash — immutable long cache
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Font files — long cache
    location /fonts/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Use Docker DNS resolver so backend can be re-resolved after restarts
    resolver 127.0.0.11 valid=30s;
    set $upstream_backend http://backend:8000;

    # SSE streaming endpoint — must disable all buffering
    location /api/chat/stream {
        proxy_pass $upstream_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 120s;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
        gzip off;
        # Prevent Cloudflare from compressing (gzip buffers entire response, breaking SSE)
        add_header Content-Encoding identity;
        proxy_hide_header Content-Encoding;
    }

    # Dynamic sitemap & RSS feed — proxy to backend
    location ~ ^/(sitemap.*\.xml|feed\.xml)$ {
        proxy_pass $upstream_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Pre-built SEO pages — serve their own index.html with correct meta tags
    location = /search {
        try_files /search/index.html /index.html;
    }
    location = /sources {
        try_files /sources/index.html /index.html;
    }
    location = /kg {
        try_files /kg/index.html /index.html;
    }
    location = /collections {
        try_files /collections/index.html /index.html;
    }
    location = /dictionary {
        try_files /dictionary/index.html /index.html;
    }
    location = /topics {
        try_files /topics/index.html /index.html;
    }

    # Umami Analytics — self-hosted, privacy-first
    set $upstream_umami http://umami:3000;
    location /umami/ {
        proxy_pass $upstream_umami;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass $upstream_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # OpenAPI docs — publicly accessible as the API documentation portal
    location /docs {
        proxy_pass $upstream_backend/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /redoc {
        proxy_pass $upstream_backend/redoc;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /openapi.json {
        proxy_pass $upstream_backend/openapi.json;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Service worker must not be cached — ensures PWA picks up new versions
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # index.html must not be cached (references hashed assets)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        # Repeat security headers (nginx add_header in location overrides server-level)
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-eval' https://analytics.fojin.app; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://analytics.fojin.app https://*.cartocdn.com https://tiles.openfreemap.org; font-src 'self' data:; worker-src 'self' blob:;" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
