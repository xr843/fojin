        <h1>佛津 FoJin — 全球佛教古籍数字资源聚合平台</h1>
        <p>佛津聚合全球 503 个佛教数字资源，覆盖 27 个国家和地区，涵盖汉传、藏传、南传、梵文等多种传统。</p>
        <h2>核心功能</h2>
        <ul>
          <li><strong>典籍搜索</strong> — 跨数据源检索佛教古籍，支持按经名、编号、译者查询</li>
          <li><strong>平行阅读</strong> — 多版本逐段对照，一览异译</li>
          <li><strong>知识图谱</strong> — 人物、寺院、宗派关系可视化</li>
          <li><strong>AI 问答</strong> — 基于典籍原文的智能问答</li>
          <li><strong>学术标注</strong> — 段落级批注与协作笔记</li>
          <li><strong>引用生成</strong> — 一键导出学术引用格式</li>
        </ul>
        <h2>数据来源</h2>
        <p>所有数据均来自全球学术机构、图书馆、大学及佛教研究组织的公开数字资源，包括 CBETA、BDRC、SAT、SuttaCentral 等权威项目。数据定期同步更新，经过自动去重与校验。</p>
