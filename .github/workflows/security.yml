name: Security Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  secrets-scan:
    name: Check for leaked secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for hardcoded secrets
        run: |
          echo "Scanning for potential secret patterns..."
          FOUND=0

          # Real API key patterns (high-confidence)
          if git grep -inE 'sk-[a-zA-Z0-9]{20,}' -- ':(exclude)*.example' ':(exclude)*.md' ':(exclude)*.yml' ':(exclude)*.yaml' ':(exclude)node_modules'; then
            echo "::error::Possible API key found in source code"
            FOUND=1
          fi

          if git grep -inE 'ghp_[a-zA-Z0-9]{30,}' -- ':(exclude)*.example' ':(exclude)*.md'; then
            echo "::error::GitHub token found in source code"
            FOUND=1
          fi

          if git grep -inE 'apify_api_[a-zA-Z0-9]{20,}' -- ':(exclude)*.example' ':(exclude)*.md'; then
            echo "::error::Apify token found in source code"
            FOUND=1
          fi

          # Check for .env files committed
          if git ls-files | grep -E '^\.env$|/\.env$' | grep -v '.example'; then
            echo "::error::.env file committed to repository"
            FOUND=1
          fi

          if [ $FOUND -eq 1 ]; then
            exit 1
          fi
          echo "No secrets found."

  bandit:
    name: Python SAST (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install bandit
        run: pip install bandit

      - name: Run bandit on backend
        run: bandit -r backend/app/ --severity-level medium -f json -o bandit-report.json || true

      - name: Display bandit results
        if: always()
        run: bandit -r backend/app/ --severity-level medium

      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  pip-audit:
    name: Python dependency audit
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        run: pip-audit --desc --output pip-audit-report.json --format json || true

      - name: Display pip-audit results
        if: always()
        run: pip-audit --desc

      - name: Upload pip-audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: backend/pip-audit-report.json

  npm-audit:
    name: Frontend dependency audit
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --omit=dev || true

      - name: Run npm audit (JSON report)
        if: always()
        run: npm audit --omit=dev --json > npm-audit-report.json || true

      - name: Upload npm audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: frontend/npm-audit-report.json
