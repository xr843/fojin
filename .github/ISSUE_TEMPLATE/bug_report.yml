name: Bug Report
description: Report a bug in FoJin
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      placeholder: A clear description of the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What you expected to happen
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Search
        - Text reading
        - Dictionary
        - Knowledge graph
        - AI Q&A
        - Data sources
        - Manuscript viewer
        - Other
